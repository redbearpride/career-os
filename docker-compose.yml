services:
  api:
    build:
      context: .
    container_name: career_api
    restart: unless-stopped

    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "${API_PORT:-8000}:8000"

    depends_on:
      postgres:
        condition: service_started

  postgres:
    image: postgres:16
    container_name: career_postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ}

    ports:
      - "${POSTGRES_PORT}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  n8n:
    image: n8nio/n8n:2.30.5
    container_name: career_n8n
    restart: unless-stopped

    environment:
      TZ: ${TZ}
      N8N_SECURE_COOKIE: "false"
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: 5678

    ports:
      - "${N8N_PORT}:5678"

    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  postgres_data:
  n8n_data:
